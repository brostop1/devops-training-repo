---
- name: Minimal local Ansible test
  hosts: local
  gather_facts: true

  tasks:
    - name: Ping localhost
      ansible.builtin.ping:

    - name: Show gathered facts example
      ansible.builtin.debug:
        msg: "Hostname={{ ansible_facts['hostname'] }}, OS={{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"

    - name: Check docker CLI availability (optional)
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false
      failed_when: false

    - name: Print docker version result
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout | default('docker not found') }}"
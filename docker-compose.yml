services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=4).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./app:/app
    restart: unless-stopped